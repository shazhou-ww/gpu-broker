name: 亚洲美女写实
description: 亚洲美女写实风格，使用 asianRealismByStable 模型
tags:
  - asian
  - beauty
  - realistic
  - portrait
  - woman
author: aobing
variables:
  prompt:
    required: true
    description: 正向提示词
  width:
    default: 1024
    description: 图片宽度
  height:
    default: 1024
    description: 图片高度
  seed:
    default: null
    description: 随机种子
template: |
  {
    "type": "txt2img",
    "model": "asianRealismByStable",
    "input": {
      "prompt": prompt & ", asian woman, realistic, photorealistic, 8k, detailed skin, natural beauty",
      "negative_prompt": "cartoon, anime, illustration, low quality, blurry, deformed, bad anatomy, ugly"
    },
    "params": {
      "width": width,
      "height": height,
      "steps": 30,
      "cfg_scale": 7.0,
      "seed": seed
    }
  }
